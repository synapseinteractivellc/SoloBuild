<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SoloBuild - Web Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181c24;
            color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 2rem 0 1rem 0;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.25rem;
            margin: 1rem 0 2rem 0;
        }
        .cta-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .cta-btn:hover {
            background: #2563eb;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        footer {
            text-align: center;
            padding: 1rem 0;
            font-size: 0.95rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <h1>SoloBuild</h1>
        <p>Build, create, and challenge yourself in this solo web game adventure!</p>
    </header>
    <main>
        <a href="#" class="cta-btn">Play Now</a>
    </main>
    <footer>
        &copy; 2024 SoloBuild. All rights reserved.
    </footer>
</body>
</html>
